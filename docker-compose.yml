services:
  web:
    build: .
    container_name: tech_verification_satto_ai_container
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle:cached
      - node_modules:/app/node_modules
      - ./storage:/app/storage # 画像をホスト側と同期させる
    depends_on:
      db:
        condition: service_healthy # DBのヘルスチェックが通るまで待機
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/satto_ai_development
      VITE_RUBY_HOST: 0.0.0.0
      TZ: Asia/Tokyo
    command: bash -c "bundle install && bundle exec rails db:prepare && rm -f tmp/pids/server.pid && bundle exec rails s -b 0.0.0.0"
    stdin_open: true
    tty: true

  vite:
    build: .
    environment:
      VITE_RUBY_HOST: 0.0.0.0
      TZ: Asia/Tokyo
    command: bundle exec vite dev
    ports:
      - "3036:3036"
    volumes:
      - .:/app
      - bundle_data:/usr/local/bundle:cached # webと同じbundleを使う

  db:
    image: postgres:15
    restart: always
    environment:
      TZ: Asia/Tokyo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: satto_ai_development
    volumes:
      # 末尾に /data を付けないとデータが永続化されない
      - postgres_data:/var/lib/postgresql/data 
    ports:
      - "5432:5432"
    healthcheck:
      # -d で指定するDB名は environment の POSTGRES_DB と合わせる
      test: ["CMD-SHELL", "pg_isready -d satto_ai_development -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: '1gb' # PostgreSQLのパフォーマンス確保のため

volumes:
  bundle_data:
  postgres_data:
  node_modules:
