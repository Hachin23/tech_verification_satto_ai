services:
  - type: web
    name: satto-ai
    runtime: ruby
    plan: free # Webサーバーを無料に固定
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec rails server"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: satto-ai-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: NODE_VERSION
        value: 22.12.0 # 使用しているNodeのバージョンに合わせる

databases:
  - name: satto-ai-db
    plan: free # データベースを無料に固定
    databaseName: satto_ai_production
    user: satto_ai_user